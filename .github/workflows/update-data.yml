name: Update and deploy G318 dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: g318-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh public data
        run: python scripts/update_data.py
      - name: Validate
        run: python -m unittest discover -s tests -v
      - name: Commit changed data
        run: |
          if git diff --quiet -- data/dashboard.json data/dashboard.js; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "g318-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/dashboard.json data/dashboard.js
          git commit -m "Update G318 public data"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
